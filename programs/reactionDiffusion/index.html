<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reakčně-difuzní simulace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="panel">
      <header class="panel-header">
        <h1>Reaction–Diffusion</h1>
        <p class="subtitle">Gray–Scott model · 2D</p>
      </header>

      <section class="section">
        <h2>Předvolby</h2>
        <select id="preset" aria-label="Předvolba vzoru">
          <option value="mitosis">Mitóza</option>
          <option value="coral">Korál</option>
          <option value="spots">Skvrny</option>
          <option value="worms">Červi</option>
          <option value="maze">Bludiště</option>
          <option value="holes">Díry</option>
          <option value="fingerprint">Otisk</option>
          <option value="waves">Vlny</option>
          <option value="custom">Vlastní</option>
        </select>
      </section>

      <section class="section">
        <h2>Parametry</h2>
        <label class="slider">
          <span>Difúze U <em id="duVal">1.00</em></span>
          <input type="range" id="du" min="0.2" max="1.2" step="0.01" value="1.0" />
        </label>
        <label class="slider">
          <span>Difúze V <em id="dvVal">0.50</em></span>
          <input type="range" id="dv" min="0.05" max="0.8" step="0.01" value="0.5" />
        </label>
        <label class="slider">
          <span>Feed <em>f</em> <em id="fVal">0.0367</em></span>
          <input type="range" id="feed" min="0.01" max="0.1" step="0.0001" value="0.0367" />
        </label>
        <label class="slider">
          <span>Kill <em>k</em> <em id="kVal">0.0649</em></span>
          <input type="range" id="kill" min="0.04" max="0.08" step="0.0001" value="0.0649" />
        </label>
        <label class="slider">
          <span>Rychlost <em id="speedVal">16</em></span>
          <input type="range" id="speed" min="1" max="40" step="1" value="16" />
        </label>
      </section>

      <section class="section">
        <h2>Rozložení</h2>
        <label class="slider">
          <span>Štětec <em id="brushVal">8</em></span>
          <input type="range" id="brush" min="1" max="40" step="1" value="8" />
        </label>
        <div class="btn-row">
          <button type="button" id="toolPaint" class="btn active" data-tool="paint">Kreslit V</button>
          <button type="button" id="toolErase" class="btn" data-tool="erase">Mazat</button>
        </div>
        <div class="btn-row">
          <button type="button" id="seedCenter" class="btn">Střed</button>
          <button type="button" id="seedRandom" class="btn">Náhodně</button>
          <button type="button" id="seedClear" class="btn">Vymazat</button>
        </div>
      </section>

      <section class="section">
        <h2>Zobrazení</h2>
        <label class="slider">
          <span>Mřížka <em id="gridVal">256</em></span>
          <input type="range" id="grid" min="64" max="512" step="32" value="256" />
        </label>
        <label class="check">
          <input type="checkbox" id="smooth" checked />
          <span>Vyhladit <em>(interp)</em></span>
        </label>
        <select id="palette" aria-label="Barevná paleta">
          <option value="jet" selected>Jet</option>
          <option value="ink">Inkoust</option>
          <option value="thermal">Termální</option>
          <option value="ocean">Oceán</option>
          <option value="ember">Žár</option>
          <option value="mono">Mono</option>
        </select>
      </section>

      <section class="section controls">
        <button type="button" id="playPause" class="btn primary">Pauza</button>
        <button type="button" id="reset" class="btn">Reset</button>
      </section>

      <p class="hint">
        Táhni myší po plátně a měň počáteční rozložení. Gray–Scott:
        <code>U + 2V → 3V</code>
      </p>
    </aside>

    <main class="stage">
      <canvas id="canvas" width="512" height="512" aria-label="Simulační plátno"></canvas>
      <div class="status">
        <span id="statusText">běží</span>
        <span id="frameInfo">0</span>
      </div>
    </main>
  </div>
  <script src="simulation.js"></script>
</body>
</html>
