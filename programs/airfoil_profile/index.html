<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NACA 4-digit profil — DXF / CSV / STEP export</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="app">
      <aside class="panel">
        <h1>NACA 4-digit profil</h1>
        <p class="subtitle">Uzavřená křivka → DXF / CSV. Vyhloubený extrudovaný profil → STEP.</p>

        <form id="profile-form" novalidate>
          <fieldset class="group">
            <legend>Profil</legend>

            <div class="field">
              <label for="naca-code">NACA kód (4 číslice)</label>
              <input
                type="text"
                id="naca-code"
                name="nacaCode"
                value="2412"
                maxlength="4"
                pattern="[0-9]{4}"
                inputmode="numeric"
                required
              />
            </div>

            <div class="field">
              <label for="thickness">Tloušťka profilu (% chord)</label>
              <input
                type="number"
                id="thickness"
                name="thickness"
                min="1"
                max="99"
                step="1"
                value="12"
                required
              />
            </div>

            <div class="field">
              <label for="scale-mm">Délka profilu — chord (mm)</label>
              <input
                type="number"
                id="scale-mm"
                name="scaleMm"
                min="1"
                step="1"
                value="200"
                required
              />
            </div>

            <div class="field">
              <label for="angle-deg">Úhel natočení (°)</label>
              <input
                type="number"
                id="angle-deg"
                name="angleDeg"
                step="0.1"
                value="0"
              />
            </div>

            <div class="field">
              <label for="point-count">Počet bodů (na stranu)</label>
              <input
                type="range"
                id="point-count"
                name="pointCount"
                min="50"
                max="300"
                value="120"
              />
              <div class="range-value" id="point-count-label">120 bodů</div>
            </div>
          </fieldset>

          <fieldset class="group">
            <legend>STEP — extruze a stěna</legend>

            <div class="field">
              <label for="wall-mm">Tloušťka stěny (mm)</label>
              <input
                type="number"
                id="wall-mm"
                name="wallMm"
                min="0.01"
                step="0.1"
                value="2"
              />
            </div>

            <div class="field">
              <label for="length-mm">Délka extruze L (mm)</label>
              <input
                type="number"
                id="length-mm"
                name="lengthMm"
                min="0.1"
                step="1"
                value="100"
              />
            </div>
          </fieldset>

          <div class="actions">
            <button type="button" class="primary" id="export-dxf">
              Exportovat DXF
            </button>
            <button type="button" class="secondary" id="export-csv">
              Exportovat CSV
            </button>
            <button type="button" class="secondary" id="export-step">
              Exportovat STEP
            </button>
          </div>
        </form>

        <div id="error" class="error" role="alert"></div>
        <div id="warning" class="warning" role="status"></div>

        <div class="legend">
          <div><span class="outer"></span> Vnější uzavřená křivka</div>
          <div><span class="inner"></span> Vnitřní křivka (offset o stěnu)</div>
        </div>
      </aside>

      <main class="viewport">
        <canvas id="profile-canvas" aria-label="Náhled NACA profilu"></canvas>
      </main>
    </div>

    <script src="js/naca4.js"></script>
    <script src="js/closedCurve.js"></script>
    <script src="js/canvasView.js"></script>
    <script src="js/dxfExport.js"></script>
    <script src="js/csvExport.js"></script>
    <script src="js/stepExport.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
