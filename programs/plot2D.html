<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Deformovaná síť 64×64 — HSV pole + kontury</title>
<style>
  html,body{height:100%;margin:0;font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial}
  #app{display:flex;flex-direction:column;height:100%}
  header{padding:10px;background:#111;color:#fff}
  #canvasWrap{flex:1;display:flex;align-items:center;justify-content:center;background:#eee}
  canvas{border:1px solid #444;max-width:100%;height:auto}
  .controls{padding:8px;background:#f8f8f8;border-top:1px solid #ddd}
  label{margin-right:8px}
</style>
</head>
<body>
<div id="app">
  <header>
    <strong>Deformovaná síť 64×64 — HSV paleta + kontury</strong>
  </header>

  <div id="canvasWrap">
    <canvas id="c" width="800" height="800"></canvas>
  </div>

  <div class="controls">
    <label>Počet kontur: <input id="nLevels" type="range" min="2" max="30" value="12" /></label>
    <span id="nLabel">12</span>
    <button id="regen">Regenerovat síť & pole</button>
    <small style="margin-left:20px;color:#666">Kliknutím na canvas zobrazíš hodnotu nejbližšího bodu.</small>
    <div id="info" style="margin-top:6px;color:#333"></div>
  </div>
</div>

<script>
// PARAMETRY
const NX = 128, NY = 128;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let WIDTH = canvas.width, HEIGHT = canvas.height;

let X = [], Y = [], V = []; // 2D arrays [i][j]
let vMin = 0, vMax = 1;

function rand(min=0,max=1){ return min + Math.random()*(max-min); }

function generateGrid(){
  const xs = new Array(NX).fill(0);
  const ys = new Array(NY).fill(0);
  let acc=0;
  for(let i=0;i<NX;i++){ acc += 1 + (Math.random()-0.5)*0.8; xs[i]=acc; }
  acc=0;
  for(let j=0;j<NY;j++){ acc += 1 + (Math.random()-0.5)*0.8; ys[j]=acc; }
  const minX = xs[0], maxX = xs[NX-1];
  const minY = ys[0], maxY = ys[NY-1];
  const PAD = 40;
  for(let i=0;i<NX;i++) xs[i] = PAD + (xs[i]-minX)/(maxX-minX)*(WIDTH-2*PAD);
  for(let j=0;j<NY;j++) ys[j] = PAD + (ys[j]-minY)/(maxY-minY)*(HEIGHT-2*PAD);

  for(let i=0;i<NX;i++){
    X[i] = []; Y[i] = [];
    for(let j=0;j<NY;j++){
      let x = xs[i];
      let y = ys[j];
      const wx = 20 * Math.sin((i/NX)*Math.PI*3) * Math.cos((j/NY)*Math.PI*2);
      const wy = 20 * Math.cos((j/NY)*Math.PI*4) * Math.sin((i/NX)*Math.PI*1.5);
      const rx = (Math.random()-0.5)*6;
      const ry = (Math.random()-0.5)*6;
      X[i][j] = x + wx + rx;
      Y[i][j] = y + wy + ry;
    }
  }
}

function generateField(){
  V = [];
  for(let i=0;i<NX;i++){
    V[i]=[];
    for(let j=0;j<NY;j++){
      V[i][j] = 0.5 * Math.sin(X[i][j] / NX *Math.PI/3) * Math.cos(Y[i][j] / NY *Math.PI/4);
    }
  }
  vMin = Infinity; vMax = -Infinity;
  for(let i=0;i<NX;i++) for(let j=0;j<NY;j++){ vMin = Math.min(vMin,V[i][j]); vMax = Math.max(vMax,V[i][j]); }
}

function hsvToRgb(h,s,v){
  let c = v*s;
  let hp = h/60;
  let x = c*(1-Math.abs(hp%2-1));
  let r=0,g=0,b=0;
  if(0<=hp && hp<1){ r=c; g=x; b=0; }
  else if(1<=hp && hp<2){ r=x; g=c; b=0; }
  else if(2<=hp && hp<3){ r=0; g=c; b=x; }
  else if(3<=hp && hp<4){ r=0; g=x; b=c; }
  else if(4<=hp && hp<5){ r=x; g=0; b=c; }
  else { r=c; g=0; b=x; }
  let m = v-c;
  r+=m; g+=m; b+=m;
  return {r:Math.round(r*255), g:Math.round(g*255), b:Math.round(b*255)};
}

function valueToColor(val){
  const t = (val - vMin) / (vMax - vMin);
  const hue = (1 - t) * 240;
  const rgb = hsvToRgb(hue, 1, 1);
  return `rgb(${rgb.r},${rgb.g},${rgb.b})`;
}

function drawField(){
  ctx.clearRect(0,0,WIDTH,HEIGHT);
  ctx.lineWidth = 0.2;
  for(let i=0;i<NX-1;i++){
    for(let j=0;j<NY-1;j++){
      const p00 = {x:X[i][j], y:Y[i][j], v:V[i][j]};
      const p10 = {x:X[i+1][j], y:Y[i+1][j], v:V[i+1][j]};
      const p11 = {x:X[i+1][j+1], y:Y[i+1][j+1], v:V[i+1][j+1]};
      const p01 = {x:X[i][j+1], y:Y[i][j+1], v:V[i][j+1]};
      const avg = (p00.v+p10.v+p11.v+p01.v)/4;
      ctx.beginPath();
      ctx.moveTo(p00.x,p00.y);
      ctx.lineTo(p10.x,p10.y);
      ctx.lineTo(p11.x,p11.y);
      ctx.lineTo(p01.x,p01.y);
      ctx.closePath();
      ctx.fillStyle = valueToColor(avg);
      ctx.fill();
    }
  }
}

// MARCHING SQUARES s lineární interpolací
const MS_TABLE = {
  1: [[3,0]],
  2: [[0,1]],
  3: [[3,1]],
  4: [[1,2]],
  5: [[3,0],[1,2]],
  6: [[0,2]],
  7: [[3,2]],
  8: [[2,3]],
  9: [[0,2]],
 10: [[0,1],[2,3]],
 11: [[1,2]],
 12: [[1,3]],
 13: [[0,1]],
 14: [[3,0]]
};

function interp(pA,pB,va,vb,level){
  const t = (level - va) / (vb - va);
  return {x: pA.x + t*(pB.x - pA.x), y: pA.y + t*(pB.y - pA.y)};
}

function drawContours(nLevels){
  const levels = [];
  for(let k=1;k<=nLevels;k++) levels.push(vMin + k/(nLevels+1)*(vMax-vMin));
  ctx.lineWidth = 1.0;
  ctx.strokeStyle = 'rgba(0,0,0,0.9)';

  for(const level of levels){
    ctx.beginPath();
    for(let i=0;i<NX-1;i++){
      for(let j=0;j<NY-1;j++){
        const v0 = V[i][j];
        const v1 = V[i+1][j];
        const v2 = V[i+1][j+1];
        const v3 = V[i][j+1];
        const caseIndex = (v0>level?1:0) + (v1>level?2:0) + (v2>level?4:0) + (v3>level?8:0);
        if(caseIndex===0 || caseIndex===15) continue;
        const p0 = {x:X[i][j], y:Y[i][j]};
        const p1 = {x:X[i+1][j], y:Y[i+1][j]};
        const p2 = {x:X[i+1][j+1], y:Y[i+1][j+1]};
        const p3 = {x:X[i][j+1], y:Y[i][j+1]};
        const e = new Array(4);
        if((v0<=level)!==(v1<=level)) e[0] = interp(p0,p1,v0,v1,level);
        if((v1<=level)!==(v2<=level)) e[1] = interp(p1,p2,v1,v2,level);
        if((v2<=level)!==(v3<=level)) e[2] = interp(p2,p3,v2,v3,level);
        if((v3<=level)!==(v0<=level)) e[3] = interp(p3,p0,v3,v0,level);
        const segs = MS_TABLE[caseIndex];
        if(!segs) continue;
        for(const s of segs){
          const a = e[s[0]], b = e[s[1]];
          if(!a||!b) continue;
          ctx.moveTo(a.x,a.y);
          ctx.lineTo(b.x,b.y);
        }
      }
    }
    ctx.stroke();
  }
}

function render(){
  drawField();
  const n = parseInt(document.getElementById('nLevels').value,10);
  drawContours(n);
}

canvas.addEventListener('click', function(ev){
  const rect = canvas.getBoundingClientRect();
  const x = (ev.clientX-rect.left) * (canvas.width/rect.width);
  const y = (ev.clientY-rect.top) * (canvas.height/rect.height);
  let best = {d:1e9, i:0, j:0};
  for(let i=0;i<NX;i++) for(let j=0;j<NY;j++){
    const dx = X[i][j]-x, dy = Y[i][j]-y; const d = dx*dx+dy*dy;
    if(d<best.d){ best={d:d,i:i,j:j}; }
  }
  const val = V[best.i][best.j];
  document.getElementById('info').textContent = `Nejbližší bod: [${best.i},${best.j}]  hodnota = ${val.toFixed(4)}`;
});

document.getElementById('nLevels').addEventListener('input', (e)=>{ document.getElementById('nLabel').textContent = e.target.value; render(); });

document.getElementById('regen').addEventListener('click', ()=>{ generateGrid(); generateField(); render(); });

function init(){
  const dpr = window.devicePixelRatio || 1;
  canvas.width = Math.floor(800 * dpr);
  canvas.height = Math.floor(800 * dpr);
  canvas.style.width = '800px';
  canvas.style.height = '800px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  WIDTH = canvas.width/dpr; HEIGHT = canvas.height/dpr;

  generateGrid();
  generateField();
  render();
}

init();
</script>
</body>
</html>
